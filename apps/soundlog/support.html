<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoundLog Support</title>
<meta name="description" content="Support page for SoundLog — noise logging & management-company reporting app. Contact, FAQ and requirements.">
<style>
 :root { --bg:#0A0B0E; --card:rgba(255,255,255,.045); --line:rgba(255,255,255,.10);
  --text:#ECEEF2; --dim:rgba(236,238,242,.66); --mute:#7C818C; --teal:#4ECDC4; --orange:#FF8F00; }
 * { box-sizing:border-box; }
 html { scroll-behavior:smooth; }
 body { margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Noto Sans SC","Noto Sans KR",sans-serif; letter-spacing:.01em; line-height:1.8; }
 body::before { content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.9;
  background:radial-gradient(circle at 6% 0%,rgba(255,143,0,.18),transparent 30rem),
   radial-gradient(circle at 94% 12%,rgba(78,205,196,.14),transparent 32rem); }
 a { color:var(--teal); text-decoration:none; }
 a:hover { text-decoration:underline; }
 .wrap { max-width:820px; margin:0 auto; padding:0 22px; }
 header { border-bottom:1px solid var(--line); position:sticky; top:0; z-index:9;
  background:rgba(10,11,14,.75); backdrop-filter:blur(16px); }
 .nav { min-height:74px; display:flex; align-items:center; gap:13px; flex-wrap:wrap; padding:10px 0; }
 .nav img.icon { width:46px; height:46px; border-radius:14px; box-shadow:0 12px 34px rgba(255,143,0,.32); }
 .nav img.word { height:30px; }
 .langbar { margin-left:auto; display:flex; gap:6px; }
 .langbar button { border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--dim);
  border-radius:999px; padding:7px 13px; font-size:13px; font-weight:800; cursor:pointer; }
 .langbar button.active { background:var(--teal); color:#071113; border-color:transparent; }
 h1 { font-size:clamp(30px,5vw,42px); letter-spacing:-.03em; margin:54px 0 10px; }
 .lead { color:var(--dim); font-size:17px; max-width:680px; }
 section { padding:30px 0; border-top:1px solid var(--line); }
 section:first-of-type { border-top:none; }
 h2 { font-size:24px; letter-spacing:-.02em; margin:8px 0 16px; }
 .label { display:inline-flex; align-items:center; gap:9px; padding:7px 13px; border-radius:999px;
  border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--teal);
  text-transform:uppercase; letter-spacing:.2em; font-size:11px; font-weight:900; margin-bottom:14px; }
 .label::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--teal); }
 .contact { border:1px solid var(--line); background:var(--card); border-radius:22px; padding:26px; }
 .contact .email { font-size:clamp(20px,4.4vw,28px); font-weight:900; color:#fff; word-break:break-all; }
 .contact .email a { color:#fff; }
 .btn { display:inline-flex; align-items:center; gap:8px; margin-top:16px; padding:13px 22px; border-radius:14px;
  background:var(--teal); color:#071113; font-weight:900; box-shadow:0 0 30px rgba(78,205,196,.26); }
 .btn:hover { text-decoration:none; filter:brightness(1.06); }
 .note { color:var(--mute); font-size:14px; margin-top:14px; }
 ul.info { margin:14px 0 0; padding-left:0; list-style:none; color:var(--dim); }
 ul.info li { padding:4px 0 4px 22px; position:relative; }
 ul.info li::before { content:"–"; position:absolute; left:4px; color:var(--teal); font-weight:900; }
 details { border:1px solid var(--line); background:var(--card); border-radius:16px; padding:18px 20px; margin-top:12px; }
 details[open] { background:rgba(255,255,255,.06); }
 summary { cursor:pointer; font-weight:800; font-size:16px; color:#fff; }
 details p { color:var(--dim); font-size:15px; margin:12px 0 0; }
 .env { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
 .env div { border:1px solid var(--line); background:var(--card); border-radius:14px; padding:16px; }
 .env b { display:block; color:#fff; font-size:15px; }
 .env span { color:var(--dim); font-size:14px; }
 footer { border-top:1px solid var(--line); padding:28px 0 50px; color:var(--mute); font-size:13px; }
 footer img { height:22px; vertical-align:middle; margin-right:10px; opacity:.9; }
 .links { margin-top:10px; display:flex; gap:18px; flex-wrap:wrap; }
 @media (max-width:560px) { .env { grid-template-columns:1fr; } }
</style>
</head>

const T={"ja": {"htmllang": "ja", "langname": "日本語", "title": "SoundLog サポート", "lead": "騒音の記録から管理会社への報告までをサポートするアプリ「SoundLog」のサポートページです。ご不明な点は、以下のお問い合わせ先またはよくある質問をご確認ください。", "contactLabel": "Contact", "contactH": "お問い合わせ", "btn": "✉ メールで問い合わせる", "mailsubject": "SoundLog お問い合わせ", "responseNote": "通常2〜3営業日以内にご返信します（土日祝を除く）。", "infoLead": "スムーズな対応のため、可能であれば以下をお書き添えください：", "info": ["ご利用の端末（例：iPhone 14 Pro）", "iOS のバージョン", "SoundLog のアプリバージョン", "発生している症状・操作手順"], "faqLabel": "FAQ", "faqH": "よくある質問", "faq": [["録音した音声や記録はどこに保存されますか？クラウドに送られますか？", "録音データや記録は、基本的にお使いの端末内に保存されます。開発者のサーバーへ自動送信されることはありません。管理会社などへ共有する場合のみ、ユーザーご自身がPDFや音声ファイルを送信します。"], ["法的な証拠として使えますか？", "スマートフォンのマイクによる簡易計測のため、法的な効力は保証していません。管理会社への相談・状況共有のための参考記録としてご活用ください。"], ["dB（デシベル）の数値はどこまで正確ですか？", "本アプリの計測は専門の騒音計とは異なる簡易的なものです。端末やケースの違いで数値が前後する場合があります。絶対値より「いつ・どのくらい続いたか」の記録としてお使いください。"], ["無料でどこまで使えますか？", "無料でも月10件まで騒音を記録でき、録音・再生・カレンダー・基本統計・PDFプレビューがご利用いただけます。PDFの保存や管理会社への送信には、レポートチケットまたはProが必要です。"], ["購入したのに機能が使えません／別の端末で復元したい", "アプリ内の購入画面にある「購入を復元」をお試しください。App Storeにサインインしているアカウントが購入時と同一であることをご確認ください。解決しない場合は、ご購入日時とともに下記までご連絡ください。"], ["音声ファイルもメールで送れますか？", "はい。PDF報告書とあわせて録音した音声ファイルを添付できます。送信前に添付内容を確認できます。メール送信にはお使いの端末にメールアカウントの設定が必要です。"], ["記録やデータを削除したいです", "各記録は一覧から個別に削除できます。アプリを削除すると、端末内に保存された記録・録音データもあわせて削除されます。削除したデータは復元できませんのでご注意ください。"], ["自動監視（自動録音）や通知が動きません", "設定画面で自動監視がオンになっているか、また通知の許可が有効かをご確認ください。端末の「設定 > SoundLog」からマイク・通知の権限が許可されているかもあわせてご確認ください。"]], "envLabel": "Environment", "envH": "動作環境", "env": [["対応OS", "iOS 13.0 以降"], ["対応端末", "iPhone"], ["対応言語", "日本語・英語・中国語・韓国語"], ["データ保存", "記録・録音は端末内に保存"]], "fContact": "お問い合わせ", "fPrivacy": "プライバシーポリシー", "fTerms": "利用規約"}, "en": {"htmllang": "en", "langname": "English", "title": "SoundLog Support", "lead": "This is the support page for SoundLog, an app that helps you record noise and report it to your management company. If you have any questions, please check the contact details below or the FAQ.", "contactLabel": "Contact", "contactH": "Contact", "btn": "✉ Contact by email", "mailsubject": "SoundLog Support", "responseNote": "We usually reply within 2–3 business days (excluding weekends and holidays).", "infoLead": "To help us assist you, please include the following if possible:", "info": ["Your device (e.g., iPhone 14 Pro)", "Your iOS version", "SoundLog app version", "The issue and steps to reproduce"], "faqLabel": "FAQ", "faqH": "Frequently Asked Questions", "faq": [["Where are my recordings and logs stored? Are they sent to the cloud?", "Recordings and logs are stored on your device by default. They are not automatically sent to the developer's servers. Files such as PDFs or audio are shared only when you choose to send them (for example, to your management company)."], ["Can this be used as legal evidence?", "Because measurements use a smartphone microphone, they are simplified and not guaranteed to have legal force. Please use the records as a reference for consulting and sharing your situation with your management company."], ["How accurate are the dB (decibel) readings?", "Measurements are simplified and differ from a professional sound level meter. Readings can vary depending on your device or case. Please use them as a record of “when and how long” rather than as absolute values."], ["What can I do for free?", "For free you can record up to 10 noise logs per month, with audio recording/playback, calendar, basic statistics, and PDF preview. Saving PDFs and sending them to your management company requires a Report Ticket or Pro."], ["I purchased but features aren't unlocked / I want to restore on another device", "Please try “Restore Purchases” on the in-app purchase screen. Make sure you are signed in to the App Store with the same account used for the purchase. If this doesn't help, contact us below with the date and time of your purchase."], ["Can I email the audio files too?", "Yes. You can attach recorded audio files along with the PDF report, and review the attachments before sending. Sending email requires a mail account set up on your device."], ["I want to delete my records or data", "You can delete each record individually from the list. Deleting the app also removes the records and audio data stored on your device. Please note that deleted data cannot be recovered."], ["Auto-monitoring (auto-recording) or notifications aren't working", "Please check that auto-monitoring is turned on in Settings and that notifications are allowed. Also check that microphone and notification permissions are granted under “Settings > SoundLog” on your device."]], "envLabel": "Environment", "envH": "Requirements", "env": [["OS", "iOS 13.0 or later"], ["Device", "iPhone"], ["Languages", "Japanese, English, Chinese, Korean"], ["Data", "Records & audio stored on device"]], "fContact": "Contact", "fPrivacy": "Privacy Policy", "fTerms": "Terms of Use"}, "zh": {"htmllang": "zh", "langname": "中文", "title": "SoundLog 支持", "lead": "这是 SoundLog 的支持页面——一款帮助您记录噪音并向物业报告的应用。如有疑问，请查看下方联系方式或常见问题。", "contactLabel": "Contact", "contactH": "联系我们", "btn": "✉ 通过邮件联系", "mailsubject": "SoundLog 支持咨询", "responseNote": "我们通常在2~3个工作日内回复（节假日除外）。", "infoLead": "为了更顺利地为您处理，请尽量附上以下信息：", "info": ["您的设备（例如 iPhone 14 Pro）", "iOS 版本", "SoundLog 应用版本", "出现的问题及操作步骤"], "faqLabel": "FAQ", "faqH": "常见问题", "faq": [["录音和记录保存在哪里？会上传到云端吗？", "录音和记录默认保存在您的设备本地，不会自动上传到开发者的服务器。只有在您主动发送时（例如发给物业），才会共享PDF或录音文件。"], ["可以作为法律证据使用吗？", "由于使用智能手机麦克风进行简易测量，我们不保证其具有法律效力。请将记录作为与物业沟通和说明情况的参考资料使用。"], ["分贝（dB）数值有多准确？", "本应用的测量为简易测量，与专业噪音计不同。数值可能因设备或保护壳而有所差异。请将其作为“何时、持续多久”的记录使用，而非绝对数值。"], ["免费可以使用到什么程度？", "免费也可每月记录最多10条噪音，并使用录音/播放、日历、基础统计和PDF预览。保存PDF或发送给物业需要购买报告券或Pro。"], ["已购买但功能无法使用／想在其他设备上恢复", "请在应用内购买页面尝试“恢复购买”。请确认登录App Store的账户与购买时一致。若仍未解决，请附上购买日期和时间联系我们。"], ["录音文件也能通过邮件发送吗？", "可以。您可以将录音文件与PDF报告一起添加为附件，并在发送前确认附件内容。发送邮件需要在设备上设置邮件账户。"], ["我想删除记录或数据", "您可以在列表中单独删除每条记录。删除应用后，保存在设备中的记录和录音数据也会一并删除。请注意，已删除的数据无法恢复。"], ["自动监测（自动录音）或通知不工作", "请确认在设置中已开启自动监测，并已允许通知。同时请在设备的“设置 > SoundLog”中确认已授予麦克风和通知权限。"]], "envLabel": "Environment", "envH": "运行环境", "env": [["支持系统", "iOS 13.0 及以上"], ["支持设备", "iPhone"], ["支持语言", "日语·英语·中文·韩语"], ["数据存储", "记录与录音保存在设备本地"]], "fContact": "联系我们", "fPrivacy": "隐私政策", "fTerms": "使用条款"}, "ko": {"htmllang": "ko", "langname": "한국어", "title": "SoundLog 지원", "lead": "소음 기록부터 관리사무소 보고까지 지원하는 앱 \"SoundLog\"의 지원 페이지입니다. 궁금한 점은 아래 문의처 또는 자주 묻는 질문을 확인해 주세요.", "contactLabel": "Contact", "contactH": "문의하기", "btn": "✉ 메일로 문의하기", "mailsubject": "SoundLog 문의", "responseNote": "보통 영업일 기준 2~3일 이내에 답변드립니다(주말·공휴일 제외).", "infoLead": "원활한 대응을 위해 가능하면 다음을 적어 주세요:", "info": ["사용 기기(예: iPhone 14 Pro)", "iOS 버전", "SoundLog 앱 버전", "발생한 증상·조작 순서"], "faqLabel": "FAQ", "faqH": "자주 묻는 질문", "faq": [["녹음과 기록은 어디에 저장되나요? 클라우드로 전송되나요?", "녹음과 기록은 기본적으로 기기 내부에 저장되며, 개발자 서버로 자동 전송되지 않습니다. 관리사무소 등에 공유할 때만 사용자가 직접 PDF나 음성 파일을 전송합니다."], ["법적 증거로 사용할 수 있나요?", "스마트폰 마이크를 이용한 간이 측정이므로 법적 효력은 보장하지 않습니다. 관리사무소 상담 및 상황 공유를 위한 참고 기록으로 활용해 주세요."], ["dB(데시벨) 수치는 얼마나 정확한가요?", "본 앱의 측정은 전문 소음계와 다른 간이 측정입니다. 기기나 케이스에 따라 수치가 달라질 수 있습니다. 절대값보다는 \"언제·얼마나 지속되었는지\"의 기록으로 사용해 주세요."], ["무료로 어디까지 사용할 수 있나요?", "무료로도 매월 10건까지 소음을 기록할 수 있으며, 녹음·재생·캘린더·기본 통계·PDF 미리보기를 이용할 수 있습니다. PDF 저장이나 관리사무소 전송에는 리포트 티켓 또는 Pro가 필요합니다."], ["구매했는데 기능을 사용할 수 없어요 / 다른 기기에서 복원하고 싶어요", "앱 내 구매 화면의 \"구매 복원\"을 시도해 주세요. App Store에 로그인된 계정이 구매 시와 동일한지 확인해 주세요. 해결되지 않으면 구매 일시와 함께 아래로 연락해 주세요."], ["음성 파일도 메일로 보낼 수 있나요?", "네. PDF 보고서와 함께 녹음한 음성 파일을 첨부할 수 있으며, 전송 전에 첨부 내용을 확인할 수 있습니다. 메일 전송에는 기기에 메일 계정 설정이 필요합니다."], ["기록이나 데이터를 삭제하고 싶어요", "각 기록은 목록에서 개별적으로 삭제할 수 있습니다. 앱을 삭제하면 기기에 저장된 기록·녹음 데이터도 함께 삭제됩니다. 삭제된 데이터는 복원할 수 없으니 주의해 주세요."], ["자동 감시(자동 녹음)나 알림이 작동하지 않아요", "설정 화면에서 자동 감시가 켜져 있는지, 알림 허용이 활성화되어 있는지 확인해 주세요. 기기의 \"설정 > SoundLog\"에서 마이크·알림 권한이 허용되어 있는지도 확인해 주세요."]], "envLabel": "Environment", "envH": "사용 환경", "env": [["지원 OS", "iOS 13.0 이상"], ["지원 기기", "iPhone"], ["지원 언어", "일본어·영어·중국어·한국어"], ["데이터 저장", "기록·녹음은 기기 내 저장"]], "fContact": "문의", "fPrivacy": "개인정보처리방침", "fTerms": "이용약관"}};
const SUPPORTED=["ja","en","zh","ko"];
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function pick(){
  const u=new URLSearchParams(location.search).get("lang");
  if(u&&SUPPORTED.includes(u))return u;
  const n=(navigator.language||"ja").toLowerCase();
  if(n.startsWith("zh"))return "zh";
  if(n.startsWith("ko"))return "ko";
  if(n.startsWith("en"))return "en";
  if(n.startsWith("ja"))return "ja";
  return "ja";
}
function render(lang){
  const t=T[lang];
  document.documentElement.lang=t.htmllang;
  document.getElementById("title").textContent=t.title;
  document.getElementById("lead").textContent=t.lead;
  document.getElementById("contactLabel").textContent=t.contactLabel;
  document.getElementById("contactH").textContent=t.contactH;
  document.getElementById("emailBtn").textContent=t.btn;
  document.getElementById("emailBtn").href="mailto:"+EMAIL+"?subject="+encodeURIComponent(t.mailsubject);
  document.getElementById("responseNote").textContent=t.responseNote;
  document.getElementById("infoLead").textContent=t.infoLead;
  document.getElementById("infoList").innerHTML=t.info.map(x=>"<li>"+esc(x)+"</li>").join("");
  document.getElementById("faqLabel").textContent=t.faqLabel;
  document.getElementById("faqH").textContent=t.faqH;
  document.getElementById("faqList").innerHTML=t.faq.map(qa=>
    "<details><summary>"+esc(qa[0])+"</summary><p>"+esc(qa[1])+"</p></details>").join("");
  document.getElementById("envGrid").innerHTML=t.env.map(e=>
    "<div><b>"+esc(e[0])+"</b><span>"+esc(e[1])+"</span></div>").join("");
  document.getElementById("fContact").textContent=t.fContact;
  document.getElementById("fPrivacy").textContent=t.fPrivacy;
  document.getElementById("fTerms").textContent=t.fTerms;
  [...document.querySelectorAll("#langbar button")].forEach(b=>
    b.classList.toggle("active", b.dataset.lang===lang));
  try{history.replaceState(null,"","?lang="+lang);}catch(e){}
}
const bar=document.getElementById("langbar");
SUPPORTED.forEach(l=>{
  const b=document.createElement("button");
  b.textContent=T[l].langname; b.dataset.lang=l;
  b.onclick=()=>render(l); bar.appendChild(b);
});
render(pick());
</script>
</body>
</html>
